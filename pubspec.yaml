name: monster_money_manager
description: "CIS4030 Group Project - Monster Money Manager App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  syncfusion_flutter_charts: ^27.1.57

  cupertino_icons: ^1.0.8
  camera: ^0.11.2
  permission_handler: ^11.0.0
  flutter_svg: ^2.2.2
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  firebase_database: ^12.1.0
  intl: ^0.19.0

  provider: ^6.0.0
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.0
  path_provider: ^2.1.5
  http: ^1.6.0
  flutter_tesseract_ocr: ^0.4.30

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/webp/
    - assets/tessdata_config.json
    - assets/tessdata/eng.traineddata
